name: Release
on:
  push:
    branches:
      - main

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js (Engine for Semantic Release)
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          HUSKY: 0

      - name: Run Quality Checks (Biome & Oxlint)
        run: bun run ci

      - name: Run Tests
        run: bun test
        env:
          NODE_ENV: test
          PORT: 3000
          HOST: 0.0.0.0
          LOG_LEVEL: info
          LOG_ROTATION_SIZE: 10M
          LOG_ROTATION_INTERVAL: 1d
          LOG_KEEP_COUNT: 7
          CORS_ORIGIN: "*"
          CORS_METHODS: "GET,POST"
          CORS_ALLOWED_HEADERS: "Content-Type"
          SWAGGER_USER: "admin"
          SWAGGER_PASS: "admin"
          RATE_LIMIT_MAX: 100
          RATE_LIMIT_WINDOW: "1m"
          RATE_LIMIT_SKIP_PATHS: "/docs"

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun run release
