name: CI - OmniNexus Backend

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: Run Lint and Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Run Biome Lint
        run: bun x @biomejs/biome check .

      - name: Run Tests
        run: bun test
        env:
          NODE_ENV: test
          PORT: 3333
          HOST: 0.0.0.0
          LOG_LEVEL: info
          LOG_ROTATION_SIZE: 10M
          LOG_ROTATION_INTERVAL: 1d
          LOG_KEEP_COUNT: 7
          CORS_ORIGIN: "*"
          CORS_METHODS: GET,POST,PUT,DELETE
          CORS_ALLOWED_HEADERS: Content-Type,Authorization,Accept-Language
          SWAGGER_USER: admin
          SWAGGER_PASS: admin
          RATE_LIMIT_MAX: 100
          RATE_LIMIT_WINDOW: 1 minute
          RATE_LIMIT_SKIP_PATHS: "[]"
          DATABASE_URL: "postgresql://postgres:password@localhost:5432/omnix?schema=public"
          JWT_SECRET: "your_jwt_secret"
