services:
  # Banco de Dados Relacional
  db:
    image: postgres:17-alpine
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M

  # Cache em Memória (Redis)
  redis:
    image: redis:7-alpine
    container_name: redis_cache
    restart: always
    # O comando abaixo ativa a senha e limita o uso de memória dentro do Redis
    command: redis-server --requirepass ${REDIS_PASS} --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT}:6379"
    deploy:
      resources:
        limits:
          cpus: "0.25" # Redis é single-thread, não precisa de muita CPU
          memory: 300M # Um pouco mais que o maxmemory do comando acima por segurança

  # Observabilidade
  grafana:
    image: grafana/grafana-oss:latest
    container_name: grafana_app
    restart: always
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_SERVER_HTTP_PORT=${GRAFANA_PORT}
    ports:
      - "${GRAFANA_PORT}:${GRAFANA_PORT}"
    volumes:
      - grafana_data:/var/lib/grafana
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M

volumes:
  postgres_data:
  grafana_data:
